apiVersion: apps/v1
kind: Deployment
metadata:
  name: phi3-mini
  namespace: vllm-chat
  labels:
    app: phi3-mini
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phi3-mini
  template:
    metadata:
      labels:
        app: phi3-mini
    spec:
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: gemma3-cache
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "4Gi"
      containers:
      - name: phi3
        image: vllm/vllm-openai:v0.10.0
        command: ["/bin/sh", "-c"]
        args: [
          "vllm serve microsoft/Phi-3.5-mini-instruct --dtype=float16 --tensor-parallel-size 1 --max-model-len 8192 --max-num-batched-tokens 8192 --max-num-seqs 12 --trust-remote-code --gpu-memory-utilization 0.80"
        ]
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "8"
            memory: 16G
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 6G
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: cache-volume
        - name: shm
          mountPath: /dev/shm
---
apiVersion: v1
kind: Service
metadata:
  name: phi3-service
  namespace: vllm-chat
spec:
  selector:
    app: phi3-mini
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30185
  type: NodePort
