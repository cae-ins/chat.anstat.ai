apiVersion: apps/v1
kind: Deployment
metadata:
  name: mistral-7b
  namespace: vllm-chat
  labels:
    app: mistral-7b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mistral-7b
  template:
    metadata:
      labels:
        app: mistral-7b
    spec:
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: gemma3-cache
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "4Gi"
      containers:
      - name: mistral
        image: vllm/vllm-openai:v0.10.0
        command: ["/bin/sh", "-c"]
        args: [
          "vllm serve mistralai/Mistral-7B-Instruct-v0.3 --dtype=float16 --tensor-parallel-size 1 --max-model-len 4096 --max-num-batched-tokens 4096 --max-num-seqs 8 --trust-remote-code --gpu-memory-utilization 0.60 --enforce-eager"
        ]
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "8"
            memory: 16G
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 6G
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: cache-volume
        - name: shm
          mountPath: /dev/shm
---
apiVersion: v1
kind: Service
metadata:
  name: mistral-service
  namespace: vllm-chat
spec:
  selector:
    app: mistral-7b
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30185
  type: NodePort
